<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="800" viewBox="0 0 1800 800" role="img" aria-labelledby="title desc">
  <title id="title">RAG Hallucination Eval Architecture</title>
  <desc id="desc">Readable architecture flow showing inputs, built-in RAG, claim detection, evaluation API, and results.</desc>
  <defs>
    <linearGradient id="arrowGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L9,6 L2,10" fill="none" stroke="#8b5cf6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="smallArrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8" fill="none" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 32px; font-weight: 800; fill: #111827; }
      .subtitle { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 22px; font-weight: 800; fill: #1f2937; }
      .body { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; fill: #111827; }
      .small { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; fill: #4b5563; }
      .tiny { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #4b5563; }
      .card { fill: #ffffff; stroke: #111827; stroke-width: 3; filter: url(#softShadow); }
      .note { fill: #f8fafc; stroke: #93c5fd; stroke-width: 2.5; }
      .contract { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .mainArrow { fill: none; stroke: url(#arrowGradient); stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowHead); }
      .routeArrow { fill: none; stroke: #60a5fa; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 10; marker-end: url(#smallArrowHead); }
      .contractLine { fill: none; stroke: #2563eb; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 9; }
    </style>
  </defs>

  <rect width="1800" height="800" fill="#ffffff"/>

  <text x="900" y="58" text-anchor="middle" class="title">RAG Hallucination Eval Architecture</text>
  <text x="900" y="94" text-anchor="middle" class="small">Built-in RAG demos and external RAG outputs share one hallucination evaluation core.</text>

  <g transform="translate(640 124)">
    <rect width="520" height="86" rx="18" fill="#f8fafc" stroke="#93c5fd" stroke-width="2.5"/>
    <text x="260" y="34" text-anchor="middle" class="subtitle">Two Entry Modes</text>
    <text x="260" y="62" text-anchor="middle" class="small">demo pipeline or API-only external outputs</text>
  </g>
  <g transform="translate(80 245)">
    <rect width="250" height="330" rx="22" fill="#f8fafc" stroke="#111827" stroke-width="6"/>
    <path d="M0 0 H250 V330 H0 Z" fill="none" stroke="#111827" stroke-width="6"/>
    <g transform="translate(92 28)">
      <rect x="0" y="0" width="66" height="82" rx="7" fill="#fff7ed" stroke="#111827" stroke-width="3"/>
      <path d="M48 0 L66 18 L48 18 Z" fill="#fde68a" stroke="#111827" stroke-width="2"/>
      <line x1="14" y1="27" x2="50" y2="27" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <line x1="14" y1="43" x2="50" y2="43" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <line x1="14" y1="59" x2="40" y2="59" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="125" y="150" text-anchor="middle" class="subtitle">Step 1</text>
    <line x1="66" y1="164" x2="184" y2="164" stroke="#111827" stroke-width="2"/>
    <text x="125" y="202" text-anchor="middle" class="body">Inputs</text>
    <text x="125" y="238" text-anchor="middle" class="small">documents</text>
    <text x="125" y="266" text-anchor="middle" class="small">eval sets</text>
    <text x="125" y="294" text-anchor="middle" class="small">RAG outputs</text>
  </g>

  <path d="M356 410 L382 410" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
  <path d="M382 396 L402 410 L382 424 Z" fill="#8b5cf6"/>

  <g transform="translate(410 245)">
    <rect width="250" height="330" rx="22" fill="#f8fafc" stroke="#111827" stroke-width="6"/>
    <path d="M0 0 H250 V330 H0 Z" fill="none" stroke="#111827" stroke-width="6"/>
    <g transform="translate(70 30)">
      <rect x="0" y="22" width="66" height="74" rx="8" fill="#eff6ff" stroke="#111827" stroke-width="3"/>
      <rect x="52" y="8" width="66" height="74" rx="8" fill="#ecfeff" stroke="#111827" stroke-width="3"/>
      <circle cx="34" cy="59" r="15" fill="#60a5fa" stroke="#111827" stroke-width="3"/>
      <path d="M86 46 L101 62 L79 62 Z" fill="#34d399" stroke="#111827" stroke-width="3"/>
      <line x1="16" y1="46" x2="40" y2="46" stroke="#111827" stroke-width="3"/>
      <line x1="66" y1="32" x2="100" y2="32" stroke="#111827" stroke-width="3"/>
    </g>
    <text x="125" y="150" text-anchor="middle" class="subtitle">Step 2</text>
    <line x1="66" y1="164" x2="184" y2="164" stroke="#111827" stroke-width="2"/>
    <text x="125" y="202" text-anchor="middle" class="body">Built-in RAG</text>
    <text x="125" y="238" text-anchor="middle" class="small">load and chunk</text>
    <text x="125" y="266" text-anchor="middle" class="small">embed retrieve</text>
    <text x="125" y="294" text-anchor="middle" class="small">generate answer</text>
  </g>

  <path d="M686 410 L712 410" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
  <path d="M712 396 L732 410 L712 424 Z" fill="#8b5cf6"/>

  <g transform="translate(740 245)">
    <rect width="250" height="330" rx="22" fill="#f8fafc" stroke="#111827" stroke-width="6"/>
    <path d="M0 0 H250 V330 H0 Z" fill="none" stroke="#111827" stroke-width="6"/>
    <g transform="translate(67 28)">
      <rect x="6" y="42" width="96" height="62" rx="12" fill="#f8fafc" stroke="#111827" stroke-width="3"/>
      <path d="M34 104 L22 126 L62 104" fill="#f8fafc" stroke="#111827" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="110" cy="32" r="36" fill="#ffffff" stroke="#111827" stroke-width="4"/>
      <text x="110" y="48" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="50" font-weight="900" fill="#111827">?</text>
      <line x1="28" y1="61" x2="82" y2="61" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
      <line x1="28" y1="78" x2="76" y2="78" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="125" y="150" text-anchor="middle" class="subtitle">Step 3</text>
    <line x1="66" y1="164" x2="184" y2="164" stroke="#111827" stroke-width="2"/>
    <text x="125" y="202" text-anchor="middle" class="body">Detect Claims</text>
    <text x="125" y="238" text-anchor="middle" class="small">supported</text>
    <text x="125" y="266" text-anchor="middle" class="small">unsupported</text>
    <text x="125" y="294" text-anchor="middle" class="small">contradicted</text>
  </g>

  <path d="M1016 410 L1042 410" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
  <path d="M1042 396 L1062 410 L1042 424 Z" fill="#8b5cf6"/>

  <g transform="translate(1070 245)">
    <rect width="250" height="330" rx="22" fill="#f8fafc" stroke="#111827" stroke-width="6"/>
    <path d="M0 0 H250 V330 H0 Z" fill="none" stroke="#111827" stroke-width="6"/>
    <g transform="translate(70 30)">
      <rect x="0" y="44" width="112" height="76" rx="10" fill="#f0fdf4" stroke="#111827" stroke-width="3"/>
      <rect x="16" y="60" width="36" height="36" fill="#bbf7d0" stroke="#111827" stroke-width="3"/>
      <line x1="66" y1="63" x2="98" y2="63" stroke="#111827" stroke-width="3"/>
      <line x1="66" y1="80" x2="98" y2="80" stroke="#111827" stroke-width="3"/>
      <line x1="66" y1="97" x2="90" y2="97" stroke="#111827" stroke-width="3"/>
      <circle cx="26" cy="18" r="14" fill="#fde68a" stroke="#111827" stroke-width="3"/>
      <rect x="78" y="8" width="20" height="20" fill="#fecdd3" stroke="#111827" stroke-width="3"/>
    </g>
    <text x="125" y="150" text-anchor="middle" class="subtitle">Step 4</text>
    <line x1="66" y1="164" x2="184" y2="164" stroke="#111827" stroke-width="2"/>
    <text x="125" y="202" text-anchor="middle" class="body">Evaluate API</text>
    <text x="125" y="238" text-anchor="middle" class="small">/detect</text>
    <text x="125" y="266" text-anchor="middle" class="small">/evaluate</text>
    <text x="125" y="294" text-anchor="middle" class="small">/batch_evaluate</text>
  </g>

  <path d="M1346 410 L1372 410" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
  <path d="M1372 396 L1392 410 L1372 424 Z" fill="#8b5cf6"/>

  <g transform="translate(1400 245)">
    <rect width="250" height="330" rx="22" fill="#f8fafc" stroke="#111827" stroke-width="6"/>
    <path d="M0 0 H250 V330 H0 Z" fill="none" stroke="#111827" stroke-width="6"/>
    <g transform="translate(72 30)">
      <rect x="2" y="42" width="110" height="78" rx="8" fill="#fef3c7" stroke="#111827" stroke-width="3"/>
      <rect x="18" y="82" width="15" height="26" fill="#60a5fa" stroke="#111827" stroke-width="2"/>
      <rect x="46" y="64" width="15" height="44" fill="#34d399" stroke="#111827" stroke-width="2"/>
      <rect x="74" y="52" width="15" height="56" fill="#fb7185" stroke="#111827" stroke-width="2"/>
      <line x1="14" y1="28" x2="100" y2="28" stroke="#111827" stroke-width="3"/>
      <path d="M90 18 L108 28 L90 38" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="125" y="150" text-anchor="middle" class="subtitle">Step 5</text>
    <line x1="66" y1="164" x2="184" y2="164" stroke="#111827" stroke-width="2"/>
    <text x="125" y="202" text-anchor="middle" class="body">Results</text>
    <text x="125" y="238" text-anchor="middle" class="small">CSV metrics</text>
    <text x="125" y="266" text-anchor="middle" class="small">figures</text>
    <text x="125" y="294" text-anchor="middle" class="small">reports</text>
  </g>

  <g transform="translate(690 655)">
    <rect width="420" height="78" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="210" y="32" text-anchor="middle" class="subtitle">Core Contract</text>
    <text x="210" y="58" text-anchor="middle" class="small">question + answer + contexts</text>
  </g>
  <path d="M900 655 L900 600" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 9"/>
  <path d="M900 600 L1195 600" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 9"/>
  <path d="M1195 600 L1195 575" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 9"/>
</svg>
