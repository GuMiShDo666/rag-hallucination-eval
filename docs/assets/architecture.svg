<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="900" viewBox="0 0 1900 900" role="img" aria-labelledby="title desc">
  <title id="title">RAG Hallucination Eval Architecture</title>
  <desc id="desc">Clear architecture diagram with non-overlapping modules, labels, icons, and flow arrows.</desc>
  <style>
    .font { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
    .title { font-size: 34px; font-weight: 800; }
    .caption { font-size: 17px; fill: #475569; }
    .step { font-size: 23px; font-weight: 800; }
    .module { font-size: 21px; }
    .detail { font-size: 16px; fill: #475569; }
  </style>

  <rect width="1900" height="900" fill="#ffffff"/>

  <text x="950" y="58" text-anchor="middle" class="font title">RAG Hallucination Eval Architecture</text>
  <text x="950" y="94" text-anchor="middle" class="font caption">Built-in RAG demos and external RAG outputs share one hallucination evaluation core.</text>

  <g transform="translate(650 125)">
    <rect width="600" height="88" rx="18" fill="#f8fafc" stroke="#93c5fd" stroke-width="3"/>
    <text x="300" y="36" text-anchor="middle" class="font step">Two Entry Modes</text>
    <text x="300" y="64" text-anchor="middle" class="font detail">demo pipeline or API-only external outputs</text>
  </g>

  <!-- Step 1 -->
  <g transform="translate(80 260)">
    <rect width="270" height="390" rx="20" fill="#f8fafc" stroke="#111827" stroke-width="4"/>
    <g transform="translate(102 35)">
      <rect x="0" y="0" width="66" height="82" rx="7" fill="#fff7ed" stroke="#111827" stroke-width="3"/>
      <path d="M48 0 L66 18 L48 18 Z" fill="#fde68a" stroke="#111827" stroke-width="2"/>
      <line x1="14" y1="28" x2="50" y2="28" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <line x1="14" y1="45" x2="50" y2="45" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <line x1="14" y1="62" x2="42" y2="62" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
    </g>
    <line x1="42" y1="140" x2="228" y2="140" stroke="#cbd5e1" stroke-width="2"/>
    <text x="135" y="176" text-anchor="middle" class="font step">Step 1</text>
    <line x1="72" y1="195" x2="198" y2="195" stroke="#111827" stroke-width="2"/>
    <text x="135" y="237" text-anchor="middle" class="font module">Inputs</text>
    <text x="135" y="284" text-anchor="middle" class="font detail">documents</text>
    <text x="135" y="314" text-anchor="middle" class="font detail">eval sets</text>
    <text x="135" y="344" text-anchor="middle" class="font detail">RAG outputs</text>
  </g>

  <path d="M376 455 L414 455" stroke="#8b5cf6" stroke-width="7" stroke-linecap="round"/>
  <path d="M414 438 L440 455 L414 472 Z" fill="#8b5cf6"/>

  <!-- Step 2 -->
  <g transform="translate(460 260)">
    <rect width="270" height="390" rx="20" fill="#f8fafc" stroke="#111827" stroke-width="4"/>
    <g transform="translate(74 34)">
      <rect x="0" y="26" width="72" height="78" rx="8" fill="#eff6ff" stroke="#111827" stroke-width="3"/>
      <rect x="55" y="8" width="72" height="78" rx="8" fill="#ecfeff" stroke="#111827" stroke-width="3"/>
      <circle cx="36" cy="66" r="16" fill="#60a5fa" stroke="#111827" stroke-width="3"/>
      <path d="M91 52 L108 70 L82 70 Z" fill="#34d399" stroke="#111827" stroke-width="3"/>
      <line x1="16" y1="52" x2="44" y2="52" stroke="#111827" stroke-width="3"/>
      <line x1="72" y1="36" x2="108" y2="36" stroke="#111827" stroke-width="3"/>
    </g>
    <line x1="42" y1="140" x2="228" y2="140" stroke="#cbd5e1" stroke-width="2"/>
    <text x="135" y="176" text-anchor="middle" class="font step">Step 2</text>
    <line x1="72" y1="195" x2="198" y2="195" stroke="#111827" stroke-width="2"/>
    <text x="135" y="237" text-anchor="middle" class="font module">Built-in RAG</text>
    <text x="135" y="284" text-anchor="middle" class="font detail">load and chunk</text>
    <text x="135" y="314" text-anchor="middle" class="font detail">embed retrieve</text>
    <text x="135" y="344" text-anchor="middle" class="font detail">generate answer</text>
  </g>

  <path d="M756 455 L794 455" stroke="#8b5cf6" stroke-width="7" stroke-linecap="round"/>
  <path d="M794 438 L820 455 L794 472 Z" fill="#8b5cf6"/>

  <!-- Step 3 -->
  <g transform="translate(840 260)">
    <rect width="270" height="390" rx="20" fill="#f8fafc" stroke="#111827" stroke-width="4"/>
    <g transform="translate(71 30)">
      <rect x="0" y="50" width="96" height="60" rx="12" fill="#ffffff" stroke="#111827" stroke-width="3"/>
      <path d="M36 110 L24 128 L62 110" fill="#ffffff" stroke="#111827" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="118" cy="38" r="34" fill="#ffffff" stroke="#111827" stroke-width="4"/>
      <text x="118" y="52" text-anchor="middle" class="font" font-size="46" font-weight="900">?</text>
      <line x1="22" y1="68" x2="78" y2="68" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
      <line x1="22" y1="86" x2="72" y2="86" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
    </g>
    <line x1="42" y1="150" x2="228" y2="150" stroke="#cbd5e1" stroke-width="2"/>
    <text x="135" y="186" text-anchor="middle" class="font step">Step 3</text>
    <line x1="72" y1="205" x2="198" y2="205" stroke="#111827" stroke-width="2"/>
    <text x="135" y="247" text-anchor="middle" class="font module">Detect Claims</text>
    <text x="135" y="294" text-anchor="middle" class="font detail">supported</text>
    <text x="135" y="324" text-anchor="middle" class="font detail">unsupported</text>
    <text x="135" y="354" text-anchor="middle" class="font detail">contradicted</text>
  </g>

  <path d="M1136 455 L1174 455" stroke="#8b5cf6" stroke-width="7" stroke-linecap="round"/>
  <path d="M1174 438 L1200 455 L1174 472 Z" fill="#8b5cf6"/>

  <!-- Step 4 -->
  <g transform="translate(1220 260)">
    <rect width="270" height="390" rx="20" fill="#f8fafc" stroke="#111827" stroke-width="4"/>
    <g transform="translate(76 30)">
      <circle cx="28" cy="28" r="15" fill="#fde68a" stroke="#111827" stroke-width="3"/>
      <rect x="88" y="15" width="22" height="22" fill="#fecdd3" stroke="#111827" stroke-width="3"/>
      <rect x="10" y="66" width="112" height="70" rx="10" fill="#f0fdf4" stroke="#111827" stroke-width="3"/>
      <rect x="26" y="82" width="36" height="36" fill="#bbf7d0" stroke="#111827" stroke-width="3"/>
      <line x1="76" y1="84" x2="106" y2="84" stroke="#111827" stroke-width="3"/>
      <line x1="76" y1="101" x2="106" y2="101" stroke="#111827" stroke-width="3"/>
      <line x1="76" y1="118" x2="98" y2="118" stroke="#111827" stroke-width="3"/>
    </g>
    <line x1="42" y1="160" x2="228" y2="160" stroke="#cbd5e1" stroke-width="2"/>
    <text x="135" y="196" text-anchor="middle" class="font step">Step 4</text>
    <line x1="72" y1="215" x2="198" y2="215" stroke="#111827" stroke-width="2"/>
    <text x="135" y="257" text-anchor="middle" class="font module">Evaluate API</text>
    <text x="135" y="304" text-anchor="middle" class="font detail">/detect</text>
    <text x="135" y="334" text-anchor="middle" class="font detail">/evaluate</text>
    <text x="135" y="364" text-anchor="middle" class="font detail">/batch_evaluate</text>
  </g>

  <path d="M1516 455 L1554 455" stroke="#8b5cf6" stroke-width="7" stroke-linecap="round"/>
  <path d="M1554 438 L1580 455 L1554 472 Z" fill="#8b5cf6"/>

  <!-- Step 5 -->
  <g transform="translate(1600 260)">
    <rect width="270" height="390" rx="20" fill="#f8fafc" stroke="#111827" stroke-width="4"/>
    <g transform="translate(78 35)">
      <line x1="18" y1="20" x2="108" y2="20" stroke="#111827" stroke-width="3"/>
      <path d="M96 8 L118 20 L96 32" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="10" y="66" width="112" height="72" rx="8" fill="#fef3c7" stroke="#111827" stroke-width="3"/>
      <rect x="24" y="102" width="16" height="26" fill="#60a5fa" stroke="#111827" stroke-width="2"/>
      <rect x="54" y="84" width="16" height="44" fill="#34d399" stroke="#111827" stroke-width="2"/>
      <rect x="84" y="72" width="16" height="56" fill="#fb7185" stroke="#111827" stroke-width="2"/>
    </g>
    <line x1="42" y1="170" x2="228" y2="170" stroke="#cbd5e1" stroke-width="2"/>
    <text x="135" y="206" text-anchor="middle" class="font step">Step 5</text>
    <line x1="72" y1="225" x2="198" y2="225" stroke="#111827" stroke-width="2"/>
    <text x="135" y="267" text-anchor="middle" class="font module">Results</text>
    <text x="135" y="314" text-anchor="middle" class="font detail">CSV metrics</text>
    <text x="135" y="344" text-anchor="middle" class="font detail">figures</text>
    <text x="135" y="374" text-anchor="middle" class="font detail">reports</text>
  </g>

  <g transform="translate(725 725)">
    <rect width="450" height="86" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <text x="225" y="36" text-anchor="middle" class="font step">Core Contract</text>
    <text x="225" y="64" text-anchor="middle" class="font detail">question + answer + contexts</text>
  </g>
  <path d="M950 725 L950 690 L1355 690 L1355 650" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10"/>
</svg>
